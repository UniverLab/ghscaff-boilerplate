[template]
name = "rust"
language = "Rust"
description = "Rust CLI template with cargo, CI/CD, and standard structure"
version = "1.0.0"

[placeholders]
# Available placeholders for interpolation
name = "Project name (kebab-case, used as binary name)"
description = "Short description of the project"
github_org = "GitHub organization/username"
github_repo = "GitHub repository name"

[files]
# Files to be generated from this template
include = [
  "Cargo.toml",
  "src/main.rs",
  "README.md",
  "CONTRIBUTING.md",
  ".github/workflows/ci.yml",
  ".github/workflows/release.yml",
  ".gitignore",
  "scripts/install.sh",
  "scripts/install.ps1"
]

[gitignore]
# Rust-specific gitignore template name for GitHub API
template = "Rust"

[ci]
# CI workflow configuration
workflow_name = "CI"
branches = ["main", "develop"]
runs_on = "ubuntu-latest"
